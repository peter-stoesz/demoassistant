<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Audio &amp; Screen Capture</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <script>
    'use strict';

    // Module-level references to prevent garbage collection
    let audioContext = null;
    let mediaStream = null;
    let mediaRecorder = null;
    let systemStream = null;
    let micStream = null;
    let videoStream = null;

    /**
     * Start screen + audio capture.
     *
     * Supports two modes:
     *   - 'full': Screen video + system audio + mic (uses chromeMediaSource: 'desktop')
     *   - 'audio-only': Mic only (no desktop capture — avoids renderer crash when
     *     screen recording permission is denied)
     *
     * In 'full' mode, if getUserMedia for desktop capture triggers Chromium's
     * "bad IPC message" kill, the main process detects the renderer crash and
     * retries in 'audio-only' mode automatically.
     *
     * Chunks are streamed to the main process via IPC as they arrive.
     */
    async function startCapture(sourceId, mode) {
      mode = mode || 'full';
      console.log('[capture] Starting capture in "' + mode + '" mode, sourceId:', sourceId);

      try {
        // ── 1. Get screen video (full mode only) ────────────────────────
        if (mode === 'full' && sourceId) {
          try {
            videoStream = await navigator.mediaDevices.getUserMedia({
              audio: false,
              video: {
                mandatory: {
                  chromeMediaSource: 'desktop',
                  chromeMediaSourceId: sourceId,
                  maxFrameRate: 15
                }
              }
            });
            console.log('[capture] Screen video captured');
          } catch (vidErr) {
            console.warn('[capture] Screen video failed:', vidErr.message);
            // NOTE: On macOS without screen recording permission, this error can
            // trigger Chromium to kill the renderer ("bad IPC message, reason 263").
            // If that happens, the main process will retry in audio-only mode.
            window.audioCaptureAPI.sendError('Screen capture failed: ' + vidErr.message);
          }
        } else {
          console.log('[capture] Skipping screen video (audio-only mode)');
        }

        // ── 2. Get system audio (full mode only) ────────────────────────
        if (mode === 'full' && sourceId) {
          try {
            systemStream = await navigator.mediaDevices.getUserMedia({
              audio: {
                mandatory: {
                  chromeMediaSource: 'desktop',
                  chromeMediaSourceId: sourceId
                }
              },
              video: false
            });
            console.log('[capture] System audio captured');
          } catch (sysErr) {
            console.warn('[capture] System audio failed:', sysErr.message);
          }
        } else {
          console.log('[capture] Skipping system audio (audio-only mode)');
        }

        // ── 3. Get microphone (both modes) ──────────────────────────────
        try {
          micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
          console.log('[capture] Microphone captured');
        } catch (micErr) {
          console.warn('[capture] Microphone failed:', micErr.message);
          if (!systemStream) {
            window.audioCaptureAPI.sendError('No audio sources available. Check Microphone permissions in System Settings.');
            return;
          }
        }

        // ── 4. Mix audio streams via AudioContext ───────────────────────
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const destination = audioContext.createMediaStreamDestination();

        if (systemStream) {
          const systemSource = audioContext.createMediaStreamSource(systemStream);
          systemSource.connect(destination);
        }
        if (micStream) {
          const micSource = audioContext.createMediaStreamSource(micStream);
          micSource.connect(destination);
        }

        // ── 5. Combine video + mixed audio into one stream ──────────────
        const combinedTracks = [];

        if (videoStream) {
          const videoTracks = videoStream.getVideoTracks();
          videoTracks.forEach(t => combinedTracks.push(t));
        }

        const audioTracks = destination.stream.getAudioTracks();
        audioTracks.forEach(t => combinedTracks.push(t));

        if (combinedTracks.length === 0) {
          window.audioCaptureAPI.sendError('No audio or video tracks available. Check Microphone permissions in System Settings.');
          return;
        }

        mediaStream = new MediaStream(combinedTracks);

        // ── 6. Create MediaRecorder ─────────────────────────────────────
        const hasVideo = combinedTracks.some(t => t.kind === 'video');
        let mimeType = '';
        const candidates = hasVideo
          ? [
              'video/webm;codecs=vp9,opus',
              'video/webm;codecs=vp8,opus',
              'video/webm;codecs=vp9',
              'video/webm;codecs=vp8',
              'video/webm'
            ]
          : [
              'audio/webm;codecs=opus',
              'audio/webm'
            ];

        for (const candidate of candidates) {
          if (MediaRecorder.isTypeSupported(candidate)) {
            mimeType = candidate;
            break;
          }
        }

        if (!mimeType) {
          window.audioCaptureAPI.sendError('No supported recording codec found');
          return;
        }

        console.log('[capture] Mode: ' + mode);
        console.log('[capture] Tracks: ' + combinedTracks.map(t => t.kind + ':' + t.label).join(', '));
        console.log('[capture] MIME type: ' + mimeType);

        mediaRecorder = new MediaRecorder(mediaStream, { mimeType });

        /**
         * Stream each chunk to main via IPC immediately.
         * 1-second chunks keep crash-loss to at most 1 second.
         */
        let rendererChunkCount = 0;
        mediaRecorder.ondataavailable = async (event) => {
          rendererChunkCount++;
          if (event.data.size > 0) {
            try {
              const buffer = await event.data.arrayBuffer();
              if (rendererChunkCount === 1) {
                console.log('[capture] First chunk: ' + buffer.byteLength + ' bytes');
              } else if (rendererChunkCount % 10 === 0) {
                console.log('[capture] Chunk #' + rendererChunkCount + ': ' + buffer.byteLength + ' bytes');
              }
              window.audioCaptureAPI.sendAudioChunk(buffer);
            } catch (err) {
              console.error('[capture] Failed to send chunk:', err);
            }
          } else {
            console.warn('[capture] ondataavailable fired with 0-byte data (chunk #' + rendererChunkCount + ')');
          }
        };

        mediaRecorder.onerror = (event) => {
          console.error('[capture] MediaRecorder error:', event.error);
          window.audioCaptureAPI.sendError('Recording error: ' + event.error);
        };

        mediaRecorder.start(1000);
        console.log('[capture] Recording started (' + mode + ' mode, streaming to disk)');
        console.log('[capture] MediaRecorder state:', mediaRecorder.state);

        // Signal main process that recording is actively running.
        // This is distinct from 'audio-capture-ready' (which just means HTML loaded).
        // Main waits for this signal before considering capture successfully started.
        window.audioCaptureAPI.sendRecordingStarted();

        // Monitor: verify data is flowing after 3 seconds
        setTimeout(() => {
          if (mediaRecorder && mediaRecorder.state === 'recording') {
            console.log('[capture] MediaRecorder still recording after 3s — chunks sent: ' + rendererChunkCount);
          } else if (mediaRecorder) {
            console.warn('[capture] MediaRecorder state after 3s: ' + mediaRecorder.state + ' — expected "recording"');
          } else {
            console.error('[capture] MediaRecorder is null after 3s — something destroyed it');
          }
        }, 3000);
      } catch (err) {
        console.error('[capture] Capture error:', err);
        window.audioCaptureAPI.sendError('Capture error: ' + err.message);
      }
    }

    /**
     * Pause recording — MediaRecorder.pause() stops data flow.
     */
    function pauseCapture() {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.pause();
        console.log('[capture] Recording paused');
      }
    }

    /**
     * Resume recording after pause.
     */
    function resumeCapture() {
      if (mediaRecorder && mediaRecorder.state === 'paused') {
        mediaRecorder.resume();
        console.log('[capture] Recording resumed');
      }
    }

    /**
     * Stop capture. After the MediaRecorder fully stops, notify main
     * so it can close the write stream and finalise the file.
     */
    async function stopCapture() {
      try {
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
          mediaRecorder.stop();

          // Wait for MediaRecorder to go inactive (final chunk fires first)
          // Safety timeout of 5 seconds to avoid hanging forever
          await new Promise((resolve) => {
            const safetyTimeout = setTimeout(() => {
              console.warn('[capture] MediaRecorder did not go inactive in 5s — proceeding anyway');
              resolve();
            }, 5000);
            const checkInterval = setInterval(() => {
              if (!mediaRecorder || mediaRecorder.state === 'inactive') {
                clearInterval(checkInterval);
                clearTimeout(safetyTimeout);
                resolve();
              }
            }, 50);
          });
        }
      } catch (err) {
        console.error('[capture] Stop error during MediaRecorder shutdown:', err);
        window.audioCaptureAPI.sendError('Stop error: ' + err.message);
      }

      // ALWAYS signal main that we're done, even if MediaRecorder stop threw.
      // Without this, main process waits for audio-capture-stopped and times out.
      try {
        window.audioCaptureAPI.sendCaptureStop();
        console.log('[capture] Stop signal sent to main');
      } catch (ipcErr) {
        console.error('[capture] Failed to send stop signal:', ipcErr);
      }

      // Cleanup all streams and context (best-effort, don't let errors block)
      try {
        if (videoStream) {
          videoStream.getTracks().forEach(track => track.stop());
          videoStream = null;
        }
        if (systemStream) {
          systemStream.getTracks().forEach(track => track.stop());
          systemStream = null;
        }
        if (micStream) {
          micStream.getTracks().forEach(track => track.stop());
          micStream = null;
        }
        if (mediaStream) {
          mediaStream.getTracks().forEach(track => track.stop());
          mediaStream = null;
        }
        if (audioContext) {
          try { audioContext.close(); } catch (_) {}
          audioContext = null;
        }
        mediaRecorder = null;
      } catch (cleanupErr) {
        console.error('[capture] Cleanup error:', cleanupErr);
      }
    }

    // ── IPC listeners ───────────────────────────────────────────────────
    window.audioCaptureAPI.onStartCapture(({ sourceId, mode }) => {
      startCapture(sourceId, mode);
    });

    window.audioCaptureAPI.onStopCapture(() => {
      stopCapture();
    });

    window.audioCaptureAPI.onPauseCapture(() => {
      pauseCapture();
    });

    window.audioCaptureAPI.onResumeCapture(() => {
      resumeCapture();
    });

    // Signal ready
    window.audioCaptureAPI.sendReady();
  </script>
</body>
</html>
